<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --surface: #fbf8fe;
    --on-surface: #1b1b1f;
    --primary: #161c54;
    --primary-container: #2d336b;
    --on-primary: #ffffff;
    --text-muted: #46464f;
    --border: #e4e1e7;
    --radius-lg: 1rem;
    --radius-md: 0.75rem;
    --shadow-card: 0px 4px 20px rgba(15, 23, 42, 0.05);
    --sidebar-width: 260px;
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--surface);
    color: var(--on-surface);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: #ffffff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand i {
    color: var(--primary-container);
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
  }

  .nav-section-label {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 1.5rem 0 0.75rem 0.75rem;
  }

  .nav-section-label:first-child {
    margin-top: 0;
  }

  .nav-item {
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: var(--radius-md);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }

  .nav-item i {
    width: 20px;
    text-align: center;
    font-size: 16px;
  }

  .nav-item:hover {
    background: #f8fafc;
    color: var(--primary);
  }

  .nav-item.active {
    background: #f0f4f8;
    color: var(--primary-container);
    font-weight: 600;
  }

  .sidebar-footer {
    padding: 1.5rem;
    border-top: 1px solid var(--border);
  }

  /* Main Content Area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 3rem;
  }

  .panel {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
  }

  .panel.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    margin-bottom: 2rem;
  }

  .panel-header h2 {
    font-size: 28px;
    font-weight: 600;
    color: var(--primary);
    margin: 0;
  }

  /* Card Styles */
  .card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  th {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: #f8fafc;
  }

  td {
    font-size: 14px;
    color: var(--on-surface);
  }

  .badge {
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    background: #e2e8f0;
    color: #475569;
  }

  .badge.active { background: #dcfce7; color: #166534; }
</style>
</head>
<body>

<div id="admin-screen">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <i class="fas fa-shield-alt"></i>
                SecurePro Admin
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section-label">Management</div>
            <div class="nav-item active" onclick="nav('students')" id="nav-students"><i class="fas fa-users"></i> Students</div>
            <div class="nav-item" onclick="nav('create')" id="nav-create"><i class="fas fa-plus-circle"></i> Create Exam</div>
            <div class="nav-item" onclick="nav('assign')" id="nav-assign"><i class="fas fa-link"></i> Assign</div>
            <div class="nav-item" onclick="nav('groups')" id="nav-groups"><i class="fas fa-layer-group"></i> Groups</div>
            <div class="nav-item" onclick="nav('manage')" id="nav-manage"><i class="fas fa-clipboard-list"></i> Manage Exams</div>
            <div class="nav-item" onclick="nav('live')" id="nav-live"><i class="fas fa-video"></i> Live Monitor</div>
            
            <div class="nav-section-label">Analytics</div>
            <div class="nav-item" onclick="nav('results')" id="nav-results"><i class="fas fa-chart-line"></i> Results</div>
            <div class="nav-item" onclick="nav('analytics')" id="nav-analytics"><i class="fas fa-chart-bar"></i> Analytics</div>
        </div>
        <div class="sidebar-footer">
            <div class="nav-item" style="color: #ba1a1a;" onclick="location.reload()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <!-- Students Panel -->
        <div id="panel-students" class="panel active">
            <div class="panel-header">
                <h2>Students Directory</h2>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Registration ID</th>
                            <th>Full Name</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stud-body">
                        <!-- Example row to show design -->
                        <tr>
                            <td style="font-family: monospace; color: var(--primary-container);">STU-10294</td>
                            <td style="font-weight: 500;">Jane Doe</td>
                            <td><span class="badge active">Verified</span></td>
                            <td><button style="background:transparent; border:1px solid var(--border); padding:6px 12px; border-radius:6px; cursor:pointer;">View Profile</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Other panels would be built similarly following the logic in index.html, with the updated CSS classes and structure. -->
    </div>
</div>

<script>
    function nav(panelId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + panelId).classList.add('active');
        
        document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
        let targetPanel = document.getElementById('panel-' + panelId);
        if(targetPanel) {
            targetPanel.classList.add('active');
        }
    }
</script>

</body>
</html>
