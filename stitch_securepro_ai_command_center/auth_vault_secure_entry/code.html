<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Vault - Secure Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --surface: #fbf8fe;
    --on-surface: #1b1b1f;
    --primary: #161c54;
    --primary-container: #2d336b;
    --on-primary: #ffffff;
    --text-muted: #46464f;
    --border: #e4e1e7;
    --border-focus: #2d336b;
    --radius-lg: 1rem;
    --radius-md: 0.75rem;
    --shadow-card: 0px 4px 20px rgba(15, 23, 42, 0.05);
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--surface);
    color: var(--on-surface);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #auth-screen {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .auth-card {
    background: #ffffff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    width: 100%;
    max-width: 440px;
    padding: 2.5rem;
    border: 1px solid var(--border);
  }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header i {
    font-size: 32px;
    color: var(--primary-container);
    margin-bottom: 1rem;
  }

  .auth-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--primary);
    margin: 0 0 0.5rem;
  }

  .auth-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
  }

  .field-group {
    margin-bottom: 1.25rem;
  }

  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: var(--on-surface);
    letter-spacing: 0.02em;
  }

  .field-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--on-surface);
    background: #ffffff;
    transition: all 0.2s ease;
    box-sizing: border-box;
  }

  .field-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45, 51, 107, 0.1);
  }

  .field-input::placeholder {
    color: #a0aec0;
  }

  .btn-primary {
    width: 100%;
    background-color: var(--primary-container);
    color: var(--on-primary);
    border: none;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 0.5rem;
  }

  .btn-primary:hover {
    background-color: var(--primary);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(45, 51, 107, 0.15);
  }

  .btn-secondary {
    width: 100%;
    background-color: transparent;
    color: var(--primary-container);
    border: 1px solid var(--border);
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 0.75rem;
  }

  .btn-secondary:hover {
    background-color: #f8fafc;
    border-color: #cbd5e1;
  }

  .divider {
    text-align: center;
    margin: 1.5rem 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    position: relative;
    background: #ffffff;
    padding: 0 10px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .hidden {
    display: none !important;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        
        <!-- Login View -->
        <div id="view-login" class="auth-view">
            <div class="auth-header">
                <i class="fas fa-shield-halved"></i>
                <h2 class="auth-title">Secure Portal Access</h2>
                <p class="auth-subtitle">Enter your credentials to continue</p>
            </div>

            <div class="field-group">
                <label class="field-label">Registration Number</label>
                <input type="text" id="login-id" class="field-input" placeholder="e.g. STU-10294">
            </div>

            <div id="otp-group" class="field-group hidden">
                <label class="field-label">Secure OTP</label>
                <input type="password" id="login-otp" class="field-input" placeholder="••••••">
            </div>

            <div id="cam-container" class="hidden" style="margin-bottom: 1.5rem; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 4/3; background: #000;">
                <video id="login-video" style="width: 100%; height: 100%; object-fit: cover;" autoplay muted playsinline></video>
            </div>

            <button id="login-action" class="btn-primary" onclick="handleStudentLogin()">Send OTP</button>

            <div class="divider"><span>Or</span></div>

            <button class="btn-secondary" onclick="switchView('register')">Create Account</button>
            <button class="btn-secondary" onclick="switchView('admin')" style="margin-top: 0.5rem; border: none; color: var(--text-muted);">Admin Access</button>
        </div>

        <!-- Registration View -->
        <div id="view-register" class="auth-view hidden">
            <div class="auth-header">
                <h2 class="auth-title">Student Registration</h2>
                <p class="auth-subtitle">Create your secure profile</p>
            </div>

            <div class="field-group">
                <label class="field-label">Full Name</label>
                <input type="text" id="reg-name" class="field-input" placeholder="John Doe">
            </div>
            
            <div class="grid-2">
                <div class="field-group">
                    <label class="field-label">Registration ID</label>
                    <input type="text" id="reg-id" class="field-input" placeholder="STU001">
                </div>
                <div class="field-group">
                    <label class="field-label">Contact Number</label>
                    <input type="tel" id="reg-mobile" class="field-input" placeholder="+1 234 567 890">
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Email Address</label>
                <input type="email" id="reg-email" class="field-input" placeholder="student@university.edu">
            </div>

            <div class="field-group">
                <label class="field-label">Identity Photo</label>
                <input type="file" id="reg-photo" class="field-input" accept="image/*" style="padding: 9px 16px;">
            </div>

            <button class="btn-primary" onclick="registerUser()">Register Account</button>
            <button class="btn-secondary" onclick="switchView('login')">Back to Login</button>
        </div>

        <!-- Admin View -->
        <div id="view-admin" class="auth-view hidden">
            <div class="auth-header">
                <i class="fas fa-user-shield"></i>
                <h2 class="auth-title">Admin Override</h2>
                <p class="auth-subtitle">Authorized personnel only</p>
            </div>

            <div class="field-group">
                <label class="field-label">Admin Username</label>
                <input type="text" id="admin-user" class="field-input" placeholder="admin">
            </div>

            <div class="field-group">
                <label class="field-label">Password</label>
                <input type="password" id="admin-pass" class="field-input" placeholder="••••••••">
            </div>

            <button class="btn-primary" onclick="handleAdminLogin()">Verify Credentials</button>
            <button class="btn-secondary" onclick="switchView('login')">Return to Student Login</button>
        </div>

    </div>
</div>

<script>
    function switchView(view) {
        document.querySelectorAll('.auth-view').forEach(el => el.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
    }
    // Logic will be handled by the main application (app.js/main.js)
</script>

</body>
</html>
