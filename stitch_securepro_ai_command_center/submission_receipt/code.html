<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Receipt</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --surface: #fbf8fe;
    --on-surface: #1b1b1f;
    --primary: #161c54;
    --primary-container: #2d336b;
    --on-primary: #ffffff;
    --text-muted: #46464f;
    --border: #e4e1e7;
    --success: #059669; /* Muted Mint Green for success state */
    --success-bg: #ecfdf5;
    --radius-lg: 1rem;
    --radius-md: 0.75rem;
    --shadow-card: 0px 4px 20px rgba(15, 23, 42, 0.05);
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--surface);
    color: var(--on-surface);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #receipt-screen {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .receipt-card {
    background: #ffffff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    width: 100%;
    max-width: 480px;
    padding: 3rem 2.5rem;
    border: 1px solid var(--border);
    text-align: center;
  }

  .success-icon-wrap {
    width: 72px;
    height: 72px;
    background-color: var(--success-bg);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    color: var(--success);
    font-size: 32px;
  }

  .receipt-title {
    font-size: 28px;
    font-weight: 600;
    color: var(--primary);
    margin: 0 0 0.5rem;
  }

  .receipt-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin: 0 0 2rem;
  }

  .details-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1.5rem;
    text-align: left;
    margin-bottom: 2rem;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .detail-row:first-child {
    padding-top: 0;
  }

  .detail-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .detail-value {
    font-size: 14px;
    color: var(--on-surface);
    font-weight: 500;
  }

  .detail-value.highlight {
    color: var(--primary-container);
    font-family: monospace;
    font-size: 13px;
  }

  .detail-value.status {
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .redirect-msg {
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary-container);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="receipt-screen">
    <div class="receipt-card">
        
        <div class="success-icon-wrap">
            <i class="fas fa-check"></i>
        </div>
        
        <h1 class="receipt-title">Exam Submitted</h1>
        <p class="receipt-subtitle">Your responses have been securely recorded.</p>
        
        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Exam Title</span>
                <span id="receipt-exam-title" class="detail-value">Data Structures Final</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Attempt ID</span>
                <span id="receipt-attempt-id" class="detail-value highlight">REQ-9482-11A</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Submitted At</span>
                <span id="receipt-timestamp" class="detail-value">May 7, 2026, 10:45 AM</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value status"><i class="fas fa-check-circle"></i> Received</span>
            </div>
        </div>
        
        <div class="redirect-msg">
            <div class="spinner"></div> Redirecting to dashboard...
        </div>
        
    </div>
</div>

</body>
</html>
